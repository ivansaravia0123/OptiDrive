<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiDrive</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161822;
            --primary: #ff3344; 
            --primary-glow: rgba(255, 51, 68, 0.2);
            --text: #f1f3f9;
            --text-secondary: #7e8494;
            --success: #00ffcc;
            --success-glow: rgba(0, 255, 204, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        header h1 span {
            color: var(--primary);
        }

        .status-badge {
            background: #1a1d29;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #2d3142;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
        }

        .status-dot.active {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 1.5s infinite;
        }

        /* DASHBOARD METRICAS */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #232635;
        }

        .card h3 {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .card p {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .card.highlight p {
            color: var(--success);
        }

        /* MAPA */
        #map-container {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid #232635;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 280px;
            z-index: 1;
        }

        /* PANEL DE CONTROLES */
        .controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #232635;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* FORMULARIO POST-VIAJE (OCULTO POR DEFECTO) */
        .post-viaje-form {
            display: none;
            flex-direction: column;
            gap: 12px;
            background: #1d2030;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #2d3142;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        input, select {
            background: #161822;
            border: 1px solid #2d3142;
            padding: 12px;
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
        }

        /* BOTONES */
        .btn {
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-start {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-stop {
            background: #ffcc00;
            color: #0d0e12;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);
            display: none;
        }

        .btn-save {
            background: var(--success);
            color: #0d0e12;
            box-shadow: 0 4px 15px var(--success-glow);
        }

        /* HISTORIAL */
        .history {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #232635;
        }

        .history h2 {
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .viaje-item {
