<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corolla LE - IVAN </title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161822;
            --primary: #ff3344; 
            --primary-glow: rgba(255, 51, 68, 0.2);
            --text: #f1f3f9;
            --text-secondary: #7e8494;
            --success: #00ffcc;
            --success-glow: rgba(0, 255, 204, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        header h1 span {
            color: var(--primary);
        }

        .status-badge {
            background: #1a1d29;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #2d3142;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
        }

        .status-dot.active {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 1.5s infinite;
        }

        /* GRID DE METRICAS */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #232635;
        }

        .card h3 {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .card p {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .card.highlight p {
            color: var(--success);
        }

        /* CONTENEDOR DEL MAPA */
        #map-container {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid #232635;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 250px;
            z-index: 1;
        }

        /* CONTROLES */
        .controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #232635;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        input, select {
            background: #1d2030;
            border: 1px solid #2d3142;
            padding: 12px;
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-start {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-stop {
            background: var(--success);
            color: #0d0e12;
            box-shadow: 0 4px 15px var(--success-glow);
            display: none;
        }

        /* HISTORIAL */
        .history {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #232635;
        }

        .history h2 {
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .viaje-item {
            background: #1d2030;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #282b3d;
        }

        .viaje-monto {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--success);
        }

        .btn-clear {
            background: transparent;
            color: #ff4444;
            font-size: 0.8rem;
            border: 1px dashed #ff4444;
            padding: 8px;
            width: 100%;
            margin-top: 10px;
            border-radius: 8px;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <header>
        <h1>COROLLA<span>PRO</span></h1>
        <div class="status-badge">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Esperando Viaje</span>
        </div>
    </header>

    <div class="dashboard">
        <div class="card highlight">
            <h3>Neto Total</h3>
            <p id="total-neto">$0.00</p>
        </div>
        <div class="card">
            <h3>Km Totales</h3>
            <p id="total-km">0.00 km</p>
        </div>
        <div class="card">
            <h3>Bruto Total</h3>
            <p id="total-bruto">$0.00</p>
        </div>
        <div class="card">
            <h3>Gas Total</h3>
            <p id="total-gas" style="color: #ff3344;">$0.00</p>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div class="controls">
        <div class="input-row">
            <div class="form-group">
                <label>Tarifa de este Viaje ($)</label>
                <input type="number" id="tarifa" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="tipo">
                    <option value="Especial">Especial</option>
                    <option value="Colectivo">Colectivo</option>
                </select>
            </div>
        </div>

        <button class="btn btn-start" id="btn-start">Iniciar Viaje Actual</button>
        <button class="btn btn-stop" id="btn-stop">Terminar y Guardar Viaje</button>
    </div>

    <div class="history">
        <h2>Historial de Viajes</h2>
        <div id="viajes-list"></div>
        <button class="btn-clear" id="btn-limpiar">Borrar Datos de la Jornada</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        let mapa, markerActual, polylineRuta;

        let distanciaViajeActual = 0;

        const btnStart = document.getElementById('btn-start');
